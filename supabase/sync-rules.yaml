# PowerSync sync rules for the Habits app.
#
# Two bucket families:
#   1. global_presets — read-only, every authed user gets the same rows
#      (preset categories + activities seeded with user_id IS NULL).
#   2. by_user        — per-user data, parameterized on the JWT subject.
#
# `daily_summaries` is intentionally absent: it stays a local-only client
# cache (see db/schema.ts).

bucket_definitions:
  global_presets:
    # No parameters — every authenticated user sees the same global bucket.
    data:
      - SELECT * FROM categories WHERE user_id IS NULL
      - SELECT * FROM activities WHERE user_id IS NULL

  by_user:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM categories               WHERE user_id = bucket.user_id
      - SELECT * FROM activities               WHERE user_id = bucket.user_id
      - SELECT * FROM time_entries             WHERE user_id = bucket.user_id
      - SELECT * FROM ideal_allocations        WHERE user_id = bucket.user_id
      - SELECT * FROM notification_preferences WHERE user_id = bucket.user_id
      - SELECT * FROM tags                     WHERE user_id = bucket.user_id
      - SELECT * FROM user_preferences         WHERE user_id = bucket.user_id
      # entry_tags has no user_id column; scope follows the parent entry.
      - >-
        SELECT et.* FROM entry_tags et
        JOIN time_entries te ON te.id = et.entry_id
        WHERE te.user_id = bucket.user_id
